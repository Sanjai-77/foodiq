<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NutriGuide — Reset Password</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥗</text></svg>">
</head>
<body>
  <div class="toast-container" id="toastContainer"></div>
  <section class="auth-page">
    <div class="auth-card">
      <div class="auth-brand">
        <div class="auth-brand-icon">🔐</div>
        <h1>Reset Password</h1>
        <p>Enter your new password below</p>
      </div>
      <div class="auth-message" id="authMessage"></div>
      <form id="resetForm" autocomplete="off">
        <div class="form-group">
          <label for="newPassword">New Password</label>
          <input type="password" id="newPassword" class="form-input" placeholder="Min 6 characters" required>
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" class="form-input" placeholder="Repeat password" required>
        </div>
        <button type="submit" class="btn btn-primary" id="resetBtn">
          <span>Reset Password</span><span>→</span>
        </button>
      </form>
      <div class="auth-footer"><a href="/">← Back to Sign In</a></div>
    </div>
  </section>
  <script>
    function showMsg(t, type) { const el = document.getElementById('authMessage'); el.textContent = t; el.className = 'auth-message ' + type; }
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    if (!token) { showMsg('Invalid reset link. No token found.', 'error'); document.getElementById('resetForm').style.display = 'none'; }
    document.getElementById('resetForm').addEventListener('submit', async e => {
      e.preventDefault();
      const pw = document.getElementById('newPassword').value;
      const cpw = document.getElementById('confirmPassword').value;
      if (pw.length < 6) return showMsg('Password must be at least 6 characters.', 'error');
      if (pw !== cpw) return showMsg('Passwords do not match.', 'error');
      const btn = document.getElementById('resetBtn');
      btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ token, newPassword: pw })
        });
        const data = await res.json();
        if (res.ok) {
          showMsg(data.message, 'success');
          setTimeout(() => window.location.href = '/', 2000);
        } else { showMsg(data.message, 'error'); }
      } catch(err) { showMsg('Network error.', 'error'); }
      btn.disabled = false; btn.innerHTML = '<span>Reset Password</span><span>→</span>';
    });
  </script>
</body>
</html>
