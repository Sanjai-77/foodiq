<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NutriGuide — Cooking Recipe</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .recipe-container {
      max-width: 800px;
      margin: 3rem auto;
      background: #fff;
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
      border: 1px solid var(--gray-200);
    }
    .recipe-header {
      background: var(--gradient-primary);
      color: #fff;
      padding: 3rem 2rem;
      text-align: center;
    }
    .recipe-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
    }
    .recipe-title {
      font-size: 2.2rem;
      font-weight: 800;
      margin-bottom: 10px;
    }
    .recipe-meta {
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
      margin-top: 15px;
    }
    .recipe-meta span {
      background: rgba(255,255,255,0.2);
      padding: 6px 14px;
      border-radius: var(--radius-full);
      font-weight: 600;
      font-size: 0.9rem;
    }
    .recipe-body {
      padding: 2.5rem 2rem;
    }
    .recipe-section-title {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--gray-800);
      border-bottom: 2px solid var(--gray-100);
      padding-bottom: 10px;
    }
    
    .ing-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 2.5rem;
    }
    .ing-card {
      background: var(--gray-50);
      border: 1px solid var(--gray-200);
      padding: 1rem;
      border-radius: var(--radius-md);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .ing-name { font-weight: 600; font-size: 0.95rem; }
    .ing-cost { color: var(--green-600); font-weight: 700; font-size: 0.85rem; }
    
    .steps-list {
      list-style: none;
      counter-reset: step-counter;
      margin-bottom: 2.5rem;
    }
    .steps-list li {
      position: relative;
      padding-left: 50px;
      margin-bottom: 1.2rem;
      font-size: 1.05rem;
      color: var(--gray-700);
      line-height: 1.5;
    }
    .steps-list li::before {
      counter-increment: step-counter;
      content: counter(step-counter);
      position: absolute;
      left: 0;
      top: 0;
      width: 32px;
      height: 32px;
      background: var(--green-100);
      color: var(--green-700);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.9rem;
    }
    
    .nutrition-breakdown {
      display: flex;
      gap: 1.5rem;
      background: var(--green-50);
      border: 1px solid var(--green-200);
      padding: 1.5rem;
      border-radius: var(--radius-lg);
    }
    .nut-item {
      flex: 1;
      text-align: center;
    }
    .nut-label { font-size: 0.8rem; text-transform: uppercase; color: var(--gray-500); font-weight: 600; margin-bottom: 4px; }
    .nut-value { font-size: 1.5rem; font-weight: 800; color: var(--gray-900); }
  </style>
</head>
<body>

  <nav class="navbar" id="navbar">
    <div class="container navbar-inner">
      <a class="navbar-brand" href="/dashboard.html">
        <div class="navbar-logo"><i class="fa-solid fa-leaf"></i></div>
        <div><div class="navbar-title">NutriGuide</div><div class="navbar-subtitle">Cooking Guidance</div></div>
      </a>
      <a href="/dashboard.html" class="btn btn-primary" style="padding: 8px 16px; font-size: 0.85rem;">← Back to Plan</a>
    </div>
  </nav>

  <div class="container">
    <div class="recipe-container">
      <div class="recipe-header">
        <div class="recipe-icon" id="rIcon"><i class="fa-solid fa-utensils"></i></div>
        <h1 class="recipe-title" id="rName">Loading...</h1>
        <div class="recipe-meta">
          <span id="rQty">0g Portion</span>
          <span id="rTotalCost">Total Cost: ₹0</span>
        </div>
      </div>
      
      <div class="recipe-body">
        
        <!-- Ingredients -->
        <h3 class="recipe-section-title">🧂 Ingredients Needed</h3>
        <div class="ing-grid" id="ingGrid">
          <!-- Filled by JS -->
        </div>

        <!-- Cooking Steps -->
        <h3 class="recipe-section-title">👨‍🍳 Cooking Instructions</h3>
        <ul class="steps-list" id="stepsList">
          <!-- Filled by JS -->
        </ul>

        <!-- Nutrition -->
        <h3 class="recipe-section-title">🔥 Nutrition Profile</h3>
        <div class="nutrition-breakdown">
          <div class="nut-item">
            <div class="nut-label">Calories</div>
            <div class="nut-value" id="rCal">0 kcal</div>
          </div>
          <div class="nut-item">
            <div class="nut-label">Protein</div>
            <div class="nut-value" id="rPro">0g</div>
          </div>
          <div class="nut-item">
            <div class="nut-label">Estimated Cost</div>
            <div class="nut-value" id="rCostDisplay" style="color:var(--green-600)">₹0</div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <footer class="app-footer">
    <div class="container footer-inner">
      <div class="footer-brand"><span><i class="fa-solid fa-leaf"></i></span><span>NutriGuide</span></div>
      <p class="footer-text">© 2026 NutriGuide — Recipe Guidance System</p>
    </div>
  </footer>

  <script src="../js/utils.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/recipe.js"></script>
</body>
</html>
