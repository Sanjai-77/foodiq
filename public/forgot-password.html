<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="FoodIQ — Reset your password.">
  <title>FoodIQ — Forgot Password</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/premium.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥗</text></svg>">
</head>
<body>
  <div class="toast-container" id="toastContainer"></div>
  <section class="auth-page">
    <div class="auth-card">
      <div class="auth-brand">
        <div class="auth-brand-icon">🔑</div>
        <h1>Forgot Password</h1>
        <p>Enter your email to receive a reset link</p>
      </div>
      <div class="auth-message" id="authMessage"></div>
      <form id="forgotForm" autocomplete="off">
        <div class="form-group">
          <label for="forgotEmail">Email Address</label>
          <input type="email" id="forgotEmail" class="form-input" placeholder="you@example.com" required>
        </div>
        <button type="submit" class="btn btn-primary" id="forgotBtn">
          <span>Send Reset Link</span><span>→</span>
        </button>
      </form>
      <div class="auth-footer"><a href="index.html">← Back to Sign In</a></div>
    </div>
  </section>
  <script>
    const API = '';
    function showMsg(text, type) {
      const el = document.getElementById('authMessage');
      el.textContent = text; el.className = 'auth-message ' + type;
    }
    document.getElementById('forgotForm').addEventListener('submit', async e => {
      e.preventDefault();
      const email = document.getElementById('forgotEmail').value.trim();
      if (!email) return showMsg('Please enter your email.', 'error');
      const btn = document.getElementById('forgotBtn');
      btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
      try {
        const res = await fetch(API + '/api/auth/forgot-password', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ email })
        });
        const data = await res.json();
        if (data.resetLink) {
          showMsg('Reset link generated! Check the console or click the link below.', 'success');
          const link = document.createElement('a');
          link.href = data.resetLink; link.textContent = 'Click here to reset password';
          link.style.cssText = 'display:block;margin-top:12px;color:#16a34a;font-weight:600;text-align:center';
          document.getElementById('forgotForm').appendChild(link);
        } else {
          showMsg(data.message, 'success');
        }
      } catch(err) { showMsg('Network error. Please try again.', 'error'); }
      btn.disabled = false; btn.innerHTML = '<span>Send Reset Link</span><span>→</span>';
    });
  </script>
</body>
</html>
