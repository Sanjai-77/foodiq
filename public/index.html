<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="FoodIQ — Sign in or create an account for your personalized meal planner.">
  <title>FoodIQ — Sign In</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/premium.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    .auth-page {
      background: linear-gradient(135deg, #dcfce7 0%, #f8fafc 100%);
    }
    .auth-card {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 20px;
      padding: 3.5rem;
      box-shadow: 0 25px 50px -12px rgba(34, 197, 94, 0.25), inset 0 0 20px rgba(255, 255, 255, 0.5);
    }
    .auth-brand h1 {
      font-family: 'Poppins', sans-serif;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    .form-input {
      border-radius: 14px;
      padding: 16px 20px;
      background: rgba(255, 255, 255, 0.9);
      border: 2px solid #e5e7eb;
      transition: all 0.3s ease;
    }
    .form-input:focus {
      border-color: #22c55e;
      box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.15);
      background: #fff;
    }
    .btn-primary {
      border-radius: 14px;
      padding: 16px 28px;
      font-size: 1.05rem;
      background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
      box-shadow: 0 10px 25px -5px rgba(34, 197, 94, 0.4);
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      transition: all 0.3s ease;
    }
    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 30px -5px rgba(34, 197, 94, 0.5);
    }
    .forgot-link {
      font-size: 0.82rem;
      color: #16a34a;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.2s;
    }
    .forgot-link:hover {
      color: #15803d;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="toast-container" id="toastContainer"></div>

  <section class="auth-page">
    <div class="noise-overlay" style="position:absolute;inset:0;background-image:url('data:image/svg+xml,%3Csvg viewBox=\'0 0 200 200\' xmlns=\'http://www.w3.org/2000/svg\'%3E%3Cfilter id=\'noiseFilter\'%3E%3CfeTurbulence type=\'fractalNoise\' baseFrequency=\'0.65\' numOctaves=\'3\' stitchTiles=\'stitch\'/%3E%3C/filter%3E%3Crect width=\'100%25\' height=\'100%25\' filter=\'url(%23noiseFilter)\'/%3E%3C/svg%3E');opacity:0.03;pointer-events:none;z-index:0;"></div>
    <div class="auth-card">
      <div class="auth-brand">
        <div class="auth-brand-icon" style="font-size: 2rem; background: var(--gradient-primary); -webkit-text-fill-color: initial;">🍲</div>
        <h1>FoodIQ</h1>
        <p>Personalized Budget-Based Meal Planner</p>
      </div>

      <div class="auth-message" id="authMessage"></div>

      <div class="auth-tabs">
        <button class="auth-tab active" id="tabLogin">Sign In</button>
        <button class="auth-tab" id="tabRegister">Register</button>
      </div>

      <!-- LOGIN FORM -->
      <form id="loginForm" autocomplete="off">
        <div class="form-group">
          <label for="loginEmail">Email Address</label>
          <input type="email" id="loginEmail" class="form-input" placeholder="you@example.com" required>
        </div>
        <div class="form-group" style="margin-bottom: 0.5rem;">
          <label for="loginPassword">Password</label>
          <div style="position: relative;">
            <input type="password" id="loginPassword" class="form-input" placeholder="••••••••" required style="width: 100%;">
            <button type="button" class="password-toggle" id="toggleLoginPassword" style="top: 50%; transform: translateY(-50%); right: 16px;"><i class="fa-regular fa-eye"></i></button>
          </div>
        </div>
        <div style="text-align: right; margin-bottom: 1.5rem;">
          <a href="forgot-password.html" class="forgot-link">Forgot password?</a>
        </div>
        <button type="submit" class="btn btn-primary" id="loginBtn">
          <span>Sign In</span> <i class="fa-solid fa-arrow-right"></i>
        </button>
      </form>

      <!-- REGISTER FORM -->
      <form id="registerForm" autocomplete="off" style="display:none">
        <div class="form-group">
          <label for="regName">Full Name</label>
          <input type="text" id="regName" class="form-input" placeholder="John Doe" required>
        </div>
        <div class="form-group">
          <label for="regEmail">Email Address</label>
          <input type="email" id="regEmail" class="form-input" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="regPassword">Password</label>
          <div style="position: relative;">
            <input type="password" id="regPassword" class="form-input" placeholder="Min 6 characters" required style="width: 100%;">
            <button type="button" class="password-toggle" id="toggleRegPassword" style="top: 50%; transform: translateY(-50%); right: 16px;"><i class="fa-regular fa-eye"></i></button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary" id="registerBtn">
          <span>Create Account</span> <i class="fa-solid fa-arrow-right"></i>
        </button>
      </form>
    </div>
  </section>

  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
